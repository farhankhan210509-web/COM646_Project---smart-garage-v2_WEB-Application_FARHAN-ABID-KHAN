<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Smart Garage</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo"><a href="index.html" style="color:inherit;">🔧 Smart<span>Garage</span></a></div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
    </div>
    <div class="nav-right">
        <a href="login.html"><button class="btn btn-outline">Login</button></a>
    </div>
</nav>

<div class="container">
    <div style="max-width:480px;margin:0 auto;">
        <div style="text-align:center;margin-bottom:28px;">
            <div style="font-size:48px;margin-bottom:10px;">👤</div>
            <h2 class="page-title" style="text-align:center;">Create an <span>Account</span></h2>
            <p class="page-sub" style="text-align:center;margin-bottom:0;">Register to book services and track your repairs.</p>
        </div>

        <div class="form-box">
            <h2>Register</h2>
            <p class="form-note">Already have an account? <a href="login.html" style="color:#e63946;font-weight:700;">Sign in here →</a></p>

            <div id="reg-alert"></div>

            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="reg-name" placeholder="Your full name">
            </div>
            <div class="form-group">
                <label>Email Address *</label>
                <input type="email" id="reg-email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password * (min 6 characters)</label>
                <input type="password" id="reg-password" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Account Type</label>
                <select id="reg-role">
                    <option value="customer">Customer</option>
                    <option value="staff">Garage Staff</option>
                </select>
            </div>

            <button id="reg-btn" class="btn btn-red btn-full" onclick="handleRegister(event)">Create Account</button>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 Smart Car Service Garage &nbsp;|&nbsp; <span>Farhan Abid Khan</span></p>
</footer>

<script src="assets/js/main.js"></script>
</body>
</html>
