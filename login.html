<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Smart Garage</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo"><a href="index.html" style="color:inherit;">🔧 Smart<span>Garage</span></a></div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="register.html">Register</a>
    </div>
    <div class="nav-right">
        <a href="register.html"><button class="btn btn-outline">Register</button></a>
    </div>
</nav>

<div class="container">
    <div style="max-width:460px;margin:0 auto;">
        <div style="text-align:center;margin-bottom:28px;">
            <div style="font-size:48px;margin-bottom:10px;">🔑</div>
            <h2 class="page-title" style="text-align:center;">Sign <span>In</span></h2>
            <p class="page-sub" style="text-align:center;margin-bottom:0;">Access your bookings and service history.</p>
        </div>

        <div class="form-box">
            <h2>Login</h2>
            <p class="form-note">
                Demo staff: <strong>admin@garage.com</strong> / <strong>admin123</strong>
                &nbsp;·&nbsp; Demo customer: <strong>customer@garage.com</strong> / <strong>customer123</strong>
            </p>

            <div id="login-alert"></div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>

            <button id="login-btn" class="btn btn-red btn-full" onclick="handleLogin(event)">Sign In</button>

            <p style="text-align:center;margin-top:16px;font-size:13px;color:#64748b;">
                Don't have an account? <a href="register.html" style="color:#e63946;font-weight:700;">Register here →</a>
            </p>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 Smart Car Service Garage &nbsp;|&nbsp; <span>Farhan Abid Khan</span></p>
</footer>

<script src="assets/js/main.js"></script>
</body>
</html>
